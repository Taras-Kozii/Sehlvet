      <main class="main">
        <section class="main__section hero">
          <div class="hero__container">
            <div class="hero__content"></div>
          </div>
        </section>
        <section class="trending">
          <div class="trending__container">
            <div class="section-header trending__header">
              <h2 class="section-header__title title">
                <strong>Trending</strong>
                <span>Collections</span>
              </h2>
              <div class="line"></div>
              <div class="section-header__body">
                Have a look on what’s trending now!
              </div>
            </div>
            <div class="tranding__content"></div>
          </div>
        </section>
        <section class="summer">
          <div class="summer__container">
            <div class="section-header summer__header">
              <h2 class="section-header__title title">
                <strong>Summer</strong>
                <span>Collections</span>
              </h2>
              <div class="line"></div>
              <div class="section-header__body">
                We consider your look and comfort on scorching weather.
              </div>
            </div>
            <div class="summer__content"></div>
          </div>
        </section>
        <section class="winter">
          <div class="winter__container">
            <div class="section-header winter__header">
              <h2 class="section-header__title title">
                <strong>Winter</strong>
                <span>Collections</span>
              </h2>
              <div class="line"></div>
              <div class="section-header__body">
                We consider your look and comfort on cold weather.
              </div>
            </div>
            <div class="winter__content"></div>
          </div>
        </section>
        <section class="reviews">
          <div class="reviews__container">
            <div class="section-header reviews__header">
              <h2 class="section-header__title title">
                <span>What our</span>
                <strong>Customer says</strong>
              </h2>
              <div class="line"></div>
              <div class="section-header__body">
                We value our customer’s feedback to provide the best service.
              </div>
            </div>
            <div class="reviews__content"></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__container">
          <div class="footer__content"></div>
        </div>
      </footer>
